services:
  - type: web
    name: tgbot-hotel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_render.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: LOG_TO_FILE
        value: "false"
      - key: LOG_TO_CONSOLE
        value: "true"
      # Другие переменные можно добавить через дашборд Render
